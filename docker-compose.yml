version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexcart-postgres
    environment:
      POSTGRES_USER: nexcart
      POSTGRES_PASSWORD: nexcart_secret
      POSTGRES_MULTIPLE_DATABASES: auth_db,user_db,order_db,payment_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/create-multiple-db.sh:/docker-entrypoint-initdb.d/create-multiple-db.sh
    ports:
      - "5432:5432"
    networks:
      - nexcart-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexcart"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: nexcart-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: nexcart
      MONGO_INITDB_ROOT_PASSWORD: nexcart_secret
      MONGO_INITDB_DATABASE: product_db
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - nexcart-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexcart-redis
    command: redis-server --requirepass nexcart_secret --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - nexcart-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "nexcart_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: nexcart-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: nexcart
      RABBITMQ_DEFAULT_PASS: nexcart_secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - nexcart-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .                                      # ← ROOT context
      dockerfile: gateway/Dockerfile                  # ← path to Dockerfile
    container_name: nexcart-gateway
    env_file: ./gateway/.env
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      product-service:
        condition: service_started
    networks:
      - nexcart-network
    restart: unless-stopped

  auth-service:
    build:
      context: .                                      # ← ROOT context
      dockerfile: services/auth-service/Dockerfile
    container_name: nexcart-auth
    env_file: ./services/auth-service/.env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexcart-network
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: nexcart-user
    env_file: ./services/user-service/.env
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexcart-network
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: nexcart-product
    env_file: ./services/product-service/.env
    ports:
      - "3003:3003"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexcart-network
    restart: unless-stopped

  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    container_name: nexcart-cart
    env_file: ./services/cart-service/.env
    ports:
      - "3004:3004"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nexcart-network
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: nexcart-order
    env_file: ./services/order-service/.env
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexcart-network
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: nexcart-payment
    env_file: ./services/payment-service/.env
    ports:
      - "3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexcart-network
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: nexcart-notification
    env_file: ./services/notification-service/.env
    ports:
      - "3007:3007"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - nexcart-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nexcart-nginx
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - nexcart-network
    restart: unless-stopped

networks:
  nexcart-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  rabbitmq_data: